<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div style="text-align:right;margin-bottom:8px">
      <a href="accounting.html" style="color:#4a90d9;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid #4a90d9;border-radius:6px">📒 記帳本</a>
    </div>
    <nav id="game-nav">
      <button class="nav-btn active" data-game="pacman">PAC-MAN</button>
      <button class="nav-btn" data-game="racing">RACING</button>
      <button class="nav-btn" data-game="flappy">FLAPPY BIRD</button>
      <button class="nav-btn" data-game="mario">MARIO</button>
      <button class="nav-btn" data-game="game2048">2048</button>
    </nav>

    <div id="pacman-section" class="game-section active">
      <div id="pacman-header">
        <h1>PAC-MAN</h1>
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Lives: <span id="lives">3</span></div>
      </div>
      <canvas id="pacmanCanvas" width="560" height="620"></canvas>
      <div id="pacman-controls">
        <button id="startBtn">START</button>
        <div id="mobile-controls">
          <div class="row">
            <button class="dir-btn" data-dir="up">▲</button>
          </div>
          <div class="row">
            <button class="dir-btn" data-dir="left">◀</button>
            <button class="dir-btn" data-dir="down">▼</button>
            <button class="dir-btn" data-dir="right">▶</button>
          </div>
        </div>
      </div>
      <div id="pacman-message" class="message"></div>
    </div>

    <div id="racing-section" class="game-section">
      <div id="racing-header">
        <h1>RACING</h1>
        <div class="stat">Score: <span id="racing-score">0</span></div>
        <div class="stat">Speed: <span id="racing-speed">0</span></div>
      </div>
      <canvas id="racingCanvas" width="400" height="600"></canvas>
      <div id="racing-controls">
        <button id="racing-startBtn">START</button>
        <div id="racing-mobile">
          <button class="racing-dir-btn" data-dir="left">◀</button>
          <button class="racing-dir-btn" data-dir="right">▶</button>
        </div>
      </div>
      <div id="racing-message" class="message"></div>
    </div>

    <div id="flappy-section" class="game-section">
      <div id="flappy-header">
        <h1>FLAPPY BIRD</h1>
        <div class="stat">Score: <span id="flappy-score">0</span></div>
        <div class="stat">Best: <span id="flappy-best">0</span></div>
      </div>
      <canvas id="flappyCanvas" width="400" height="600"></canvas>
      <div id="flappy-controls">
        <button id="flappy-startBtn">START</button>
        <div id="flappy-mobile">
          <button id="flappy-tap-btn">FLAP</button>
        </div>
      </div>
      <div id="flappy-message" class="message"></div>
    </div>

    <div id="mario-section" class="game-section">
      <div id="mario-header">
        <h1>MARIO</h1>
        <div class="stat">Score: <span id="mario-score">0</span></div>
        <div class="stat">Coins: <span id="mario-coins">0</span></div>
      </div>
      <canvas id="marioCanvas" width="600" height="500"></canvas>
      <div id="mario-controls">
        <button id="mario-startBtn">START</button>
        <div id="mario-mobile">
          <button class="mario-dir-btn" data-dir="left">◀</button>
          <button id="mario-jump-btn">▲</button>
          <button class="mario-dir-btn" data-dir="right">▶</button>
        </div>
      </div>
      <div id="mario-message" class="message"></div>
    </div>

    <div id="game2048-section" class="game-section">
      <div id="game2048-header">
        <h1>2048</h1>
        <div class="stat">Score: <span id="g2048-score">0</span></div>
        <div class="stat">Best: <span id="g2048-best">0</span></div>
      </div>
      <canvas id="g2048Canvas" width="400" height="460"></canvas>
      <div id="g2048-controls">
        <button id="g2048-startBtn">NEW GAME</button>
        <div id="g2048-mobile">
          <div class="row">
            <button class="g2048-dir-btn" data-dir="up">▲</button>
          </div>
          <div class="row">
            <button class="g2048-dir-btn" data-dir="left">◀</button>
            <button class="g2048-dir-btn" data-dir="down">▼</button>
            <button class="g2048-dir-btn" data-dir="right">▶</button>
          </div>
        </div>
      </div>
      <div id="g2048-message" class="message"></div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.game + '-section').classList.add('active');
      });
    });
  </script>
  <script src="game.js"></script>
  <script src="racing.js"></script>
  <script src="flappy.js"></script>
  <script src="mario.js"></script>
  <script src="game2048.js"></script>
</body>
</html>
