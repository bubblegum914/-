<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍀 記帳本</title>
  <link rel="stylesheet" href="accounting.css">

</head>
<body>
  <div class="container">
    <header>
      <h1>🧚🏻‍♀️ 記帳本</h1>
      <div class="header-right">
        <div class="user-area" id="userArea" style="display:none">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn">登出</button>
        </div>
      </div>
    </header>

    <div class="today-bar">
      <div class="today-item">
        <span class="ti-icon">🎶</span>
        <span class="ti-label">今日收入</span>
        <span class="ti-value inc" id="todayInc">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">🩰</span>
        <span class="ti-label">今日支出</span>
        <span class="ti-value exp" id="todayExp">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">🐚</span>
        <span class="ti-label">今日結餘</span>
        <span class="ti-value bal" id="todayBal">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">📝</span>
        <span class="ti-label">今天記了幾筆</span>
        <span class="ti-value" id="todayCount">0</span>
      </div>
    </div>

    <div class="summary-row">
      <div class="sum-card">
        <span class="sum-icon">🍀</span>
        <div>
          <div class="sum-label">月收入</div>
          <div class="sum-value inc" id="monthInc">$0</div>
        </div>
      </div>
      <div class="sum-card">
        <span class="sum-icon">🍡</span>
        <div>
          <div class="sum-label">月支出</div>
          <div class="sum-value exp" id="monthExp">$0</div>
        </div>
      </div>
      <div class="sum-card">
        <span class="sum-icon">🫧</span>
        <div>
          <div class="sum-label">月結餘</div>
          <div class="sum-value bal" id="monthBal">$0</div>
        </div>
      </div>
    </div>

    <div class="goals-row">
      <div class="goal-card">
        <div class="goal-hd">
          <span>🎼 月度收入目標</span>
          <span class="goal-nums">$<span id="gMonthlyEarned">0</span> / $<span id="gMonthlyTarget">0</span></span>
        </div>
        <div class="goal-track"><div class="goal-fill" id="gMonthlyFill"></div></div>
        <div class="goal-ft">
          <span id="gMonthlyPct">0%</span>
          <span id="gMonthlyRemain">尚未設定目標</span>
        </div>
        <div class="goal-set">
          <input type="number" id="gMonthlyInput" placeholder="月收入目標">
          <button id="gMonthlyBtn">設定</button>
        </div>
      </div>
      <div class="goal-card">
        <div class="goal-hd">
          <span>🍥 年度收入目標</span>
          <span class="goal-nums">$<span id="gYearlyEarned">0</span> / $<span id="gYearlyTarget">0</span></span>
        </div>
        <div class="goal-track"><div class="goal-fill" id="gYearlyFill"></div></div>
        <div class="goal-ft">
          <span id="gYearlyPct">0%</span>
          <span id="gYearlyRemain">尚未設定目標</span>
        </div>
        <div class="goal-set">
          <input type="number" id="gYearlyInput" placeholder="年收入目標">
          <button id="gYearlyBtn">設定</button>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <div class="col">
        <div class="section-card">
          <h3>📊 本月分類</h3>
          <div id="catStats"></div>
        </div>
        <div class="section-card">
          <h3>🎶 今日記錄</h3>
          <div id="todayEntries"></div>
        </div>
      </div>
      <div class="col">
        <div class="section-card">
          <h3>📝 所有記錄</h3>
          <div class="rec-controls">
            <select id="recMonth"></select>
            <select id="recType">
              <option value="all">全部</option>
              <option value="income">🍀 收入</option>
              <option value="expense">🍡 支出</option>
            </select>
            <input type="text" id="recSearch" placeholder="🔍 搜尋">
          </div>
          <div id="recList"></div>
        </div>
      </div>
    </div>

    <button class="fab" id="fabAdd">➕</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-inner">
      <div class="modal-hd">
        <h3 id="modalTitle">📝 新增記錄</h3>
        <button class="modal-x" id="modalClose">✕</button>
      </div>
      <form id="modalForm">
        <div class="field">
          <label>類型</label>
          <div class="toggle">
            <button type="button" class="tg-btn active" data-type="income">🍀 收入</button>
            <button type="button" class="tg-btn" data-type="expense">🍡 支出</button>
          </div>
        </div>
        <div class="field">
          <label>📅 日期</label>
          <input type="date" id="fDate" required>
        </div>
        <div class="field">
          <label>📂 類別</label>
          <select id="fCat" required></select>
        </div>
        <div class="field">
          <label>💵 金額</label>
          <div class="amt-input-wrap">
            <button type="button" class="amt-btn amt-minus" id="amtMinus">−100</button>
            <input type="number" id="fAmount" placeholder="0" min="0" step="1" required>
            <button type="button" class="amt-btn amt-plus" id="amtPlus">+100</button>
          </div>
        </div>
        <div class="field">
          <label>💬 備註</label>
          <input type="text" id="fNote" placeholder="選擇性備註">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary" id="fSubmit">💾 儲存</button>
          <button type="button" class="btn-secondary" id="fCancel">↩ 取消</button>
        </div>
      </form>
    </div>
  </div>

  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🍀 記帳本</h2>
      <p>輸入你的名字開始記帳</p>
      <form id="loginForm" style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <input type="text" id="loginName" placeholder="你的名字" style="width:200px;padding:10px 14px;border:2px solid #98d0b0;border-radius:10px;font-size:15px;text-align:center;outline:none;background:rgba(255,255,255,0.8);color:#392309;font-family:inherit">
        <button type="submit" style="padding:10px 30px;border:none;border-radius:10px;background:#98d0b0;color:#392309;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">🧚🏻‍♀️ 開始記帳</button>
      </form>
      <p class="login-note">不同名字擁有各自的記帳資料</p>
    </div>
  </div>

  <script src="accounting.js"></script>
</body>
</html>
