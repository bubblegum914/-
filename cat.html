<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍀 記帳本 ✦ 太空貓</title>
  <link rel="stylesheet" href="accounting.css">
  <style>
    body::before {
      background-image:
        radial-gradient(rgba(57,35,9,0.35) 2.5px, transparent 2.5px),
        radial-gradient(rgba(57,35,9,0.2) 2.5px, transparent 2.5px);
      background-size: 40px 40px, 40px 40px;
      background-position: 0 0, 20px 20px;
    }

    .space-cat {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      animation: driftAround 30s ease-in-out infinite, wobble 4s ease-in-out infinite;
      width: 140px;
      height: 180px;
    }
    @keyframes driftAround {
      0%   { left: 75%; top: 75%; transform: rotate(0deg) scale(1); }
      10%  { left: 65%; top: 30%; transform: rotate(60deg) scale(0.97); }
      20%  { left: 82%; top: 12%; transform: rotate(120deg) scale(1.03); }
      30%  { left: 78%; top: 45%; transform: rotate(200deg) scale(0.98); }
      40%  { left: 60%; top: 85%; transform: rotate(260deg) scale(1.02); }
      50%  { left: 40%; top: 80%; transform: rotate(320deg) scale(0.96); }
      60%  { left: 25%; top: 65%; transform: rotate(380deg) scale(1.04); }
      70%  { left: 15%; top: 40%; transform: rotate(440deg) scale(0.97); }
      80%  { left: 28%; top: 20%; transform: rotate(520deg) scale(1.02); }
      90%  { left: 50%; top: 15%; transform: rotate(600deg) scale(0.98); }
      100% { left: 75%; top: 75%; transform: rotate(720deg) scale(1); }
    }
    @keyframes wobble {
      0%, 100% { margin-top: 0; }
      25% { margin-top: -6px; }
      75% { margin-top: 4px; }
    }
    .space-cat svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .star {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 8px;
      opacity: 0.25;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="star" style="top:8%;left:5%">✦</div>
  <div class="star" style="top:15%;right:8%;animation-delay:0.5s">✦</div>
  <div class="star" style="top:45%;left:3%;animation-delay:1s">✧</div>
  <div class="star" style="top:60%;right:4%;animation-delay:1.5s">✦</div>
  <div class="star" style="top:80%;left:7%;animation-delay:0.8s">✧</div>
  <div class="star" style="top:30%;right:12%;animation-delay:2s">✦</div>
  <div class="star" style="top:75%;right:15%;animation-delay:0.3s">✧</div>
  <div class="star" style="top:50%;left:10%;animation-delay:1.8s">✦</div>

  <div class="space-cat">
    <svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Tail -->
      <path d="M150 185 Q175 170 180 145 Q185 125 170 115 Q160 110 158 120 Q155 135 165 140 Q172 143 168 155 Q162 170 145 178" fill="#C4956A" stroke="#B08058" stroke-width="0.8"/>

      <!-- Back body -->
      <ellipse cx="95" cy="165" rx="50" ry="55" fill="#C4956A"/>

      <!-- Belly -->
      <ellipse cx="90" cy="175" rx="32" ry="40" fill="#E8D8C0"/>

      <!-- Left back leg -->
      <ellipse cx="58" cy="200" rx="16" ry="10" fill="#C4956A" transform="rotate(-15 58 200)"/>

      <!-- Right back leg -->
      <ellipse cx="132" cy="200" rx="16" ry="10" fill="#C4956A" transform="rotate(15 132 200)"/>

      <!-- Left front paw -->
      <ellipse cx="70" cy="208" rx="13" ry="10" fill="#C4956A"/>
      <!-- Paw pad -->
      <ellipse cx="70" cy="212" rx="6" ry="4" fill="#D4A8A0" opacity="0.5"/>

      <!-- Right front paw -->
      <ellipse cx="118" cy="208" rx="13" ry="10" fill="#C4956A"/>
      <ellipse cx="118" cy="212" rx="6" ry="4" fill="#D4A8A0" opacity="0.5"/>

      <!-- Chest fluff -->
      <ellipse cx="90" cy="148" rx="22" ry="18" fill="#F0E4D4" opacity="0.6"/>

      <!-- Head -->
      <circle cx="95" cy="82" r="38" fill="#C4956A"/>

      <!-- Left ear -->
      <path d="M62 62 L50 30 L78 52 Z" fill="#C4956A" stroke="#B08058" stroke-width="0.5"/>
      <path d="M64 58 L55 36 L75 52 Z" fill="#E8B8A0" opacity="0.7"/>

      <!-- Right ear -->
      <path d="M128 62 L140 30 L112 52 Z" fill="#C4956A" stroke="#B08058" stroke-width="0.5"/>
      <path d="M126 58 L135 36 L115 52 Z" fill="#E8B8A0" opacity="0.7"/>

      <!-- Face fur pattern -->
      <path d="M75 70 Q95 65 115 70 Q105 90 95 95 Q85 90 75 70" fill="#D4AD80" opacity="0.3"/>

      <!-- Left eye (almond shape) -->
      <ellipse cx="78" cy="77" rx="9" ry="10" fill="#F0E8D8"/>
      <ellipse cx="78" cy="77" rx="7" ry="8" fill="#6B9A4A"/>
      <ellipse cx="78" cy="77" rx="4" ry="8" fill="#392309"/>
      <circle cx="80" cy="73" r="3" fill="#fff" opacity="0.9"/>
      <circle cx="76" cy="79" r="1.5" fill="#fff" opacity="0.4"/>

      <!-- Right eye (almond shape) -->
      <ellipse cx="112" cy="77" rx="9" ry="10" fill="#F0E8D8"/>
      <ellipse cx="112" cy="77" rx="7" ry="8" fill="#6B9A4A"/>
      <ellipse cx="112" cy="77" rx="4" ry="8" fill="#392309"/>
      <circle cx="114" cy="73" r="3" fill="#fff" opacity="0.9"/>
      <circle cx="110" cy="79" r="1.5" fill="#fff" opacity="0.4"/>

      <!-- Eye outlines -->
      <ellipse cx="78" cy="77" rx="9" ry="10" fill="none" stroke="#8A6848" stroke-width="0.8"/>
      <ellipse cx="112" cy="77" rx="9" ry="10" fill="none" stroke="#8A6848" stroke-width="0.8"/>

      <!-- Nose -->
      <path d="M92 93 L95 90 L98 93 Z" fill="#E8A0A0"/>

      <!-- Mouth -->
      <path d="M90 96 Q92 100 95 98 Q98 100 100 96" fill="none" stroke="#A08070" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="95" y1="93" x2="95" y2="96" stroke="#A08070" stroke-width="1"/>

      <!-- Whiskers left -->
      <line x1="55" y1="84" x2="72" y2="90" stroke="#C0A890" stroke-width="0.8"/>
      <line x1="52" y1="92" x2="72" y2="93" stroke="#C0A890" stroke-width="0.8"/>
      <line x1="55" y1="100" x2="72" y2="96" stroke="#C0A890" stroke-width="0.8"/>

      <!-- Whiskers right -->
      <line x1="135" y1="84" x2="118" y2="90" stroke="#C0A890" stroke-width="0.8"/>
      <line x1="138" y1="92" x2="118" y2="93" stroke="#C0A890" stroke-width="0.8"/>
      <line x1="135" y1="100" x2="118" y2="96" stroke="#C0A890" stroke-width="0.8"/>

      <!-- Cheek fluff -->
      <ellipse cx="62" cy="94" rx="10" ry="6" fill="#D4AD80" opacity="0.3"/>
      <ellipse cx="128" cy="94" rx="10" ry="6" fill="#D4AD80" opacity="0.3"/>

      <!-- Helmet (glass dome) -->
      <circle cx="95" cy="80" r="52" fill="rgba(180,220,240,0.06)" stroke="rgba(150,210,240,0.35)" stroke-width="2.5"/>

      <!-- Helmet glass reflection -->
      <ellipse cx="72" cy="58" rx="18" ry="9" fill="rgba(255,255,255,0.2)" transform="rotate(-30 72 58)"/>
      <ellipse cx="68" cy="65" rx="8" ry="4" fill="rgba(255,255,255,0.15)" transform="rotate(-40 68 65)"/>

      <!-- Helmet ring at base -->
      <rect x="43" y="126" width="104" height="5" rx="2.5" fill="#A8A8A8"/>
      <rect x="43" y="126" width="104" height="2" rx="1" fill="#D0D0D0" opacity="0.6"/>
    </svg>
  </div>

  <div class="container">
    <header>
      <h1>🧚🏻‍♀️ 記帳本 ✦ 太空貓</h1>
      <div class="header-right">
        <div class="user-area" id="userArea" style="display:none">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn">登出</button>
        </div>
      </div>
    </header>

    <div class="today-bar">
      <div class="today-item">
        <span class="ti-icon">🎶</span>
        <span class="ti-label">今日收入</span>
        <span class="ti-value inc" id="todayInc">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">🩰</span>
        <span class="ti-label">今日支出</span>
        <span class="ti-value exp" id="todayExp">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">🐚</span>
        <span class="ti-label">今日結餘</span>
        <span class="ti-value bal" id="todayBal">$0</span>
      </div>
      <div class="today-item">
        <span class="ti-icon">📝</span>
        <span class="ti-label">今天記了幾筆</span>
        <span class="ti-value" id="todayCount">0</span>
      </div>
    </div>

    <div class="summary-row">
      <div class="sum-card">
        <span class="sum-icon">🍀</span>
        <div>
          <div class="sum-label">月收入</div>
          <div class="sum-value inc" id="monthInc">$0</div>
        </div>
      </div>
      <div class="sum-card">
        <span class="sum-icon">🍡</span>
        <div>
          <div class="sum-label">月支出</div>
          <div class="sum-value exp" id="monthExp">$0</div>
        </div>
      </div>
      <div class="sum-card">
        <span class="sum-icon">🫧</span>
        <div>
          <div class="sum-label">月結餘</div>
          <div class="sum-value bal" id="monthBal">$0</div>
        </div>
      </div>
    </div>

    <div class="goals-row">
      <div class="goal-card">
        <div class="goal-hd">
          <span>🎼 月度收入目標</span>
          <span class="goal-nums">$<span id="gMonthlyEarned">0</span> / $<span id="gMonthlyTarget">0</span></span>
        </div>
        <div class="goal-track"><div class="goal-fill" id="gMonthlyFill"></div></div>
        <div class="goal-ft">
          <span id="gMonthlyPct">0%</span>
          <span id="gMonthlyRemain">尚未設定目標</span>
        </div>
        <div class="goal-set">
          <input type="number" id="gMonthlyInput" placeholder="月收入目標">
          <button id="gMonthlyBtn">設定</button>
        </div>
      </div>
      <div class="goal-card">
        <div class="goal-hd">
          <span>🍥 年度收入目標</span>
          <span class="goal-nums">$<span id="gYearlyEarned">0</span> / $<span id="gYearlyTarget">0</span></span>
        </div>
        <div class="goal-track"><div class="goal-fill" id="gYearlyFill"></div></div>
        <div class="goal-ft">
          <span id="gYearlyPct">0%</span>
          <span id="gYearlyRemain">尚未設定目標</span>
        </div>
        <div class="goal-set">
          <input type="number" id="gYearlyInput" placeholder="年收入目標">
          <button id="gYearlyBtn">設定</button>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <div class="col">
        <div class="section-card">
          <h3>📊 本月分類</h3>
          <div id="catStats"></div>
        </div>
        <div class="section-card">
          <h3>🎶 今日記錄</h3>
          <div id="todayEntries"></div>
        </div>
      </div>
      <div class="col">
        <div class="section-card">
          <h3>📝 所有記錄</h3>
          <div class="rec-controls">
            <select id="recMonth"></select>
            <select id="recType">
              <option value="all">全部</option>
              <option value="income">🍀 收入</option>
              <option value="expense">🍡 支出</option>
            </select>
            <input type="text" id="recSearch" placeholder="🔍 搜尋">
          </div>
          <div id="recList"></div>
        </div>
      </div>
    </div>

    <button class="fab" id="fabAdd">➕</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-inner">
      <div class="modal-hd">
        <h3 id="modalTitle">📝 新增記錄</h3>
        <button class="modal-x" id="modalClose">✕</button>
      </div>
      <form id="modalForm">
        <div class="field">
          <label>類型</label>
          <div class="toggle">
            <button type="button" class="tg-btn active" data-type="income">🍀 收入</button>
            <button type="button" class="tg-btn" data-type="expense">🍡 支出</button>
          </div>
        </div>
        <div class="field">
          <label>📅 日期</label>
          <input type="date" id="fDate" required>
        </div>
        <div class="field">
          <label>📂 類別</label>
          <select id="fCat" required></select>
        </div>
        <div class="field">
          <label>💵 金額</label>
          <div class="amt-input-wrap">
            <button type="button" class="amt-btn amt-minus" id="amtMinus">−100</button>
            <input type="number" id="fAmount" placeholder="0" min="0" step="1" required>
            <button type="button" class="amt-btn amt-plus" id="amtPlus">+100</button>
          </div>
        </div>
        <div class="field">
          <label>💬 備註</label>
          <input type="text" id="fNote" placeholder="選擇性備註">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary" id="fSubmit">💾 儲存</button>
          <button type="button" class="btn-secondary" id="fCancel">↩ 取消</button>
        </div>
      </form>
    </div>
  </div>

  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🍀 記帳本</h2>
      <p>輸入你的名字開始記帳</p>
      <form id="loginForm" style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <input type="text" id="loginName" placeholder="你的名字" style="width:200px;padding:10px 14px;border:2px solid #98d0b0;border-radius:10px;font-size:15px;text-align:center;outline:none;background:rgba(255,255,255,0.8);color:#392309;font-family:inherit">
        <button type="submit" style="padding:10px 30px;border:none;border-radius:10px;background:#98d0b0;color:#392309;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">🧚🏻‍♀️ 開始記帳</button>
      </form>
      <p class="login-note">不同名字擁有各自的記帳資料</p>
    </div>
  </div>

  <script src="accounting.js"></script>
</body>
</html>
